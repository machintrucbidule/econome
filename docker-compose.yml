# Optional compose for prod/parity testing (technical/07 §2, §4). The day-to-day
# local loop uses scripts/start.bat (native exe), not this file.
#
# Load-bearing: the SQLite database + secret live on a MOUNTED NAMED VOLUME, never
# in the container's writable layer — this is what keeps data safe across
# Watchtower image recreation. TLS is terminated by an upstream reverse proxy on
# the external `proxy` network; the app listens HTTP on :8765.
services:
  econome:
    image: ghcr.io/machintrucbidule/econome:stable
    container_name: econome
    restart: unless-stopped
    environment:
      ECONOME_DATA_DIR: /data
      ECONOME_LISTEN: ":8765"
      ECONOME_BEHIND_TLS: "1"
      ECONOME_DEFAULT_LOCALE: fr
      ECONOME_LOG_LEVEL: info
      # ECONOME_TRUSTED_PROXY: <proxy IP/CIDR>
    volumes:
      - econome-data:/data
    expose:
      - "8765"
    networks:
      - proxy
    # Liveness is GET /healthz (lands in increment 1); the reverse proxy /
    # Portainer performs the health check. distroless has no shell for a
    # container-internal HEALTHCHECK.

volumes:
  econome-data:

networks:
  proxy:
    external: true
