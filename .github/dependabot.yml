# Automated dependency updates (G14, I-005). Grouped and on a weekly cadence to
# keep the small, boring dependency set current without manual toil; updates go
# through the same CI gates before merge.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: build

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
