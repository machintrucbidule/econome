name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Quality gates (guardrails/04 §1): format → vet → lint → test(-race) →
  # govulncheck → build. All blocking. Order fails fast and cheap.
  # ---------------------------------------------------------------------------
  quality:
    name: format · vet · lint · test · vuln · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod  # uses the toolchain pinned in go.mod
          cache: true

      - name: Format check (gofumpt)
        run: |
          go install mvdan.cc/gofumpt@latest
          DIFF=$("$(go env GOPATH)/bin/gofumpt" -l .)
          if [ -n "$DIFF" ]; then
            echo "::error::gofumpt found unformatted files:"; echo "$DIFF"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint v2 — incl. depguard, gosec, exhaustive)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2  # pinned to the version verified locally (Dependabot can bump)

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        # The ~90% internal/engine coverage gate is enforced from increment 2
        # (when the engine package exists); see guardrails/03 §7.

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Build binaries
        run: |
          go build -o /tmp/econome ./cmd/econome
          go build -o /tmp/econome-admin ./cmd/econome-admin

  # ---------------------------------------------------------------------------
  # Validate the multi-arch Dockerfile on every PR / main push (no publish).
  # ---------------------------------------------------------------------------
  image-build:
    name: multi-arch image build (no push)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=ci-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Publish on a release tag only (guardrails/04 §3): immutable vX.Y.Z + the
  # moving `stable` channel Watchtower follows. Inert until a v* tag is pushed.
  # ---------------------------------------------------------------------------
  release:
    name: publish multi-arch image to GHCR
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/econome:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/econome:stable
          build-args: |
            VERSION=${{ github.ref_name }}
