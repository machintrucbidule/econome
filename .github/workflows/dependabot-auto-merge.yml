name: Dependabot auto-merge

# Auto-merge Dependabot PRs once all required CI checks pass — but ONLY for
# minor/patch bumps (I-008). Major bumps stay manual so a human reviews
# potentially breaking changes (appropriate for a remotely-exposed finance app).
# This is the GitHub-documented secure pattern: the workflow runs on the
# Dependabot `pull_request` event with an explicit least-privilege token; it does
# not use pull_request_target and never checks out / runs PR code.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash) for minor/patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
