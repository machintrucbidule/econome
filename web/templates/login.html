{{define "login"}}<!DOCTYPE html>
<html lang="{{.LangCode}}" data-theme="{{.ThemeCode}}">
<head>{{template "head" .}}<title>{{.T "login.title"}} — {{.T "app.name"}}</title></head>
<body data-theme="{{.ThemeCode}}">
<div class="authstage">
  <div class="authwrap">
    <div class="brand">Econo<b>Me</b></div>
    <div class="tagline">{{.T "app.tagline"}}</div>
    <div class="auth-card">
      <h1>{{.T "login.heading"}}</h1>
      {{if .GenericError}}<div class="errbox">{{.GenericError}}</div>{{end}}
      {{if gt .LockedSeconds 0}}<div class="warnbox">{{.T "login.locked" (itoa .LockedSeconds)}}</div>{{end}}
      <form method="post" action="/login">
        <input type="hidden" name="_csrf" value="{{.CSRF}}">
        <div class="fld">
          <label for="email">{{.T "login.email"}}</label>
          <input class="inp" id="email" type="email" name="email" value="{{.Email}}" autocomplete="username" required autofocus>
        </div>
        <div class="fld">
          <label for="password">{{.T "login.password"}}</label>
          <input class="inp" id="password" type="password" name="password" autocomplete="current-password" required>
        </div>
        <label class="check"><input type="checkbox" name="remember" value="1" {{if .Remember}}checked{{end}}> {{.T "login.remember"}}</label>
        <button class="btn primary btn-block" type="submit">{{.T "login.submit"}}</button>
      </form>
    </div>
  </div>
</div>
{{template "scripts" .}}
</body>
</html>{{end}}
